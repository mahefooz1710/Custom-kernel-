name: Build Ultimate Custom Kernel

# Ye aapko "One Click" run button dega
on:
  workflow_dispatch:

jobs:
  build-kernel:
    runs-on: ubuntu-latest
    
    steps:
      - name: 1. Setup Build Environment
        run: |
          sudo apt-get update
          sudo apt-get install -y git ccache automake flex lzop bison gperf build-essential zip curl zlib1g-dev g++-multilib libxml2-utils bzip2 libbz2-dev libbz2-1.0 libghc-bzlib-dev squashfs-tools pngcrush schedtool dpkg-dev liblz4-tool make optipng maven libssl-dev pwgen libswitch-perl policycoreutils minicom libxml-sax-base-perl libxml-simple-perl bc libc6-dev-i386 lib32ncurses5-dev x11proto-core-dev libx11-dev lib32z-dev libgl1-mesa-dev xsltproc unzip device-tree-compiler python3

      - name: 2. Download Kernel Source & Toolchain
        run: |
          git clone --depth=1 https://github.com/LineageOS/android_kernel_xiaomi_sdm660.git -b lineage-18.1 kernel_src
          git clone --depth=1 https://github.com/kdrag0n/proton-clang.git toolchain

      - name: 3. Apply Hardware Mods (15050mAh, F2FS, ZRAM, Charging, OTG)
        run: |
          cd kernel_src
          DEFCONFIG="arch/arm64/configs/sdm660_defconfig"
          sed -i 's/# CONFIG_F2FS_FS is not set/CONFIG_F2FS_FS=y\nCONFIG_F2FS_STAT_FS=y\nCONFIG_F2FS_FS_XATTR=y\nCONFIG_F2FS_FS_POSIX_ACL=y/g' $DEFCONFIG
          sed -i 's/# CONFIG_ZRAM is not set/CONFIG_ZRAM=y\nCONFIG_ZRAM_LZ4_COMPRESS=y\nCONFIG_CRYPTO_LZ4=y/g' $DEFCONFIG
          echo "CONFIG_IOSCHED_MAPLE=y" >> $DEFCONFIG
          echo "CONFIG_IOSCHED_ZEN=y" >> $DEFCONFIG
          echo "CONFIG_IOSCHED_FIOPS=y" >> $DEFCONFIG
          echo "CONFIG_USB_FASTCHARGE=y" >> $DEFCONFIG
          find arch/arm64/boot/dts/qcom/ -name "*.dtsi" -exec sed -i 's/qcom,batt-capacity-mah = <3010>;/qcom,batt-capacity-mah = <15050>;/g' {} +
          find arch/arm64/boot/dts/qcom/ -name "*.dtsi" -exec sed -i 's/qcom,batt-capacity-mah = <3000>;/qcom,batt-capacity-mah = <15050>;/g' {} +
          SMB_LIB="drivers/power/supply/qcom/smb-lib.c"
          if [ -f "$SMB_LIB" ]; then sed -i 's/0444, fcc_max_show, NULL/0664, fcc_max_show, fcc_max_store/g' $SMB_LIB; fi
          USB_CORE="drivers/usb/dwc3/core.c"
          if [ -f "$USB_CORE" ]; then sed -i 's/dwc->vbus_active = true;/dwc->vbus_active = true;\n\t\tdwc->b_suspend = false;/g' $USB_CORE; fi

      - name: 4. Compile Kernel
        run: |
          cd kernel_src
          export PATH="$GITHUB_WORKSPACE/toolchain/bin:$PATH"
          make O=out ARCH=arm64 sdm660_defconfig
          make O=out -j$(nproc --all) ARCH=arm64 CC=clang CLANG_TRIPLE=aarch64-linux-gnu- CROSS_COMPILE=aarch64-linux-gnu- CROSS_COMPILE_ARM32=arm-linux-gnueabi- LD=ld.lld AR=llvm-ar NM=llvm-nm OBJCOPY=llvm-objcopy OBJDUMP=llvm-objdump STRIP=llvm-strip LLVM=1 LLVM_IAS=1

      - name: 5. Pack Final ZIP with AnyKernel3 (A-only Setup)
        run: |
          git clone --depth=1 https://github.com/osm0sis/AnyKernel3.git AnyKernel3
          cd AnyKernel3
          rm -rf .git README.md *~
          cp ../kernel_src/out/arch/arm64/boot/Image.gz-dtb ./
          sed -i 's/device.name1=maguro/device.name1=jasmine_sprout/g' anykernel.sh
          sed -i 's/device.name2=toro/device.name2=jasmine/g' anykernel.sh
          sed -i 's|block=/dev/block/platform/omap/omap_hsmmc.0/by-name/boot|block=/dev/block/bootdevice/by-name/boot|g' anykernel.sh
          sed -i 's/is_slot_device=1;/is_slot_device=0;/g' anykernel.sh
          sed -i 's/is_slot_device=auto;/is_slot_device=0;/g' anykernel.sh
          zip -r9 ../Mi_A2_Ultimate_Kernel_Mod.zip *

      - name: 6. Upload Flashable ZIP
        uses: actions/upload-artifact@v4
        with:
          name: Mi_A2_Ultimate_Kernel_Mod
          path: Mi_A2_Ultimate_Kernel_Mod.zip
          
